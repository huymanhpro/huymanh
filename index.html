<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dò Mìn 3x3 Chuyên Nghiệp</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { margin-top: 0; color: var(--primary); font-size: 1.8rem;}

        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            gap: 10px;
        }

        .tab-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            flex: 1;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary);
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 1.5rem 0;
        }

        .cell {
            background-color: #334155;
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .cell:hover:not(.revealed) { 
            background-color: #475569; 
            transform: scale(1.05);
        }
        .cell.revealed { background-color: #64748b; cursor: not-allowed; }
        .cell.mine { background-color: var(--danger) !important; box-shadow: 0 0 15px var(--danger); }
        .cell.safe { background-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #475569;
            background: #0f172a;
            color: white;
            text-align: center;
            font-size: 1rem;
            margin: 10px 0;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn:hover { background-color: #059669; }
        .btn.danger { background-color: var(--danger); }
        .btn.danger:hover { background-color: #dc2626; }

        .hidden { display: none; }
        .info { font-size: 1.1rem; margin: 1rem 0; line-height: 1.5; }
        .timer { color: var(--warning); font-weight: bold; font-size: 1.4rem; }
        
        .code-box {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            word-break: break-all;
            user-select: all;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💣 Dò Mìn Thử Thách</h1>

    <div class="tabs">
        <button class="tab-btn active" id="tab-create" onclick="switchTab('create')">Đặt Mìn</button>
        <button class="tab-btn" id="tab-play" onclick="switchTab('play')">Nhập Mã</button>
    </div>

    <!-- TẠO MÌN -->
    <div id="create-panel" class="panel active">
        <p>Nhấp vào 1 ô bên dưới để <strong>Đặt Mìn</strong></p>
        <div class="board" id="create-board"></div>
        <button class="btn hidden" id="save-btn" onclick="generateCode()">Lưu & Tạo Mã</button>
        <div class="info" id="create-code-display"></div>
    </div>

    <!-- CHƠI GAME -->
    <div id="play-panel" class="panel">
        <input type="text" id="join-code" placeholder="Dán mã chia sẻ vào đây...">
        <button class="btn" onclick="loadGame()">Tham gia chơi</button>
        
        <div id="game-ui" class="hidden">
            <div class="info">Thời gian còn lại: <span class="timer" id="timer">01:00</span></div>
            <div class="board" id="play-board"></div>
            <div class="info" id="play-msg"></div>
        </div>
    </div>
</div>

<script>
    let boardState =; 
    let playBoardState = [-1, -1, -1, -1, -1, -1, -1, -1, -1]; 
    let mineIndex = -1;
    let gameTimer;
    let timeLeft = 60;
    let gameActive = false;
    let usedCodes = new Set(); 

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        
        if(tabId === 'create') {
            document.getElementById('tab-create').classList.add('active');
            document.getElementById('create-panel').classList.add('active');
            resetCreateBoard();
        } else {
            document.getElementById('tab-play').classList.add('active');
            document.getElementById('play-panel').classList.add('active');
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('join-code').value = '';
        }
    }

    function resetCreateBoard() {
        boardState =;
        mineIndex = -1;
        document.getElementById('save-btn').classList.add('hidden');
        document.getElementById('create-code-display').innerHTML = '';
        renderCreateBoard();
    }

    function renderCreateBoard() {
        const board = document.getElementById('create-board');
        board.innerHTML = '';
        boardState.forEach((val, idx) => {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            if (val === 1) {
                cell.classList.add('mine');
                cell.innerText = '💣';
            }
            
            cell.onclick = () => {
                boardState =; // Reset các ô khác
                boardState[idx] = 1;
                mineIndex = idx;
                renderCreateBoard();
                document.getElementById('save-btn').classList.remove('hidden');
            };
            board.appendChild(cell);
        });
    }

    // TẠO MÃ
    function generateCode() {
        if (mineIndex === -1) return alert("Vui lòng chọn 1 ô để đặt mìn!");
        const secretCode = btoa(`${mineIndex}|${Date.now()}`);
        document.getElementById('create-code-display').innerHTML = 
            `Sao chép mã này gửi cho bạn bè:<br><div class="code-box">${secretCode}</div>`;
    }

    // THAM GIA CHƠI
    function loadGame() {
        const code = document.getElementById('join-code').value.trim();
        if (!code) return alert("Vui lòng nhập mã!");
        
        if (usedCodes.has(code)) {
            return alert("Lỗi: Bạn đã chơi mã này rồi! Quy định không được chơi lại lần 2.");
        }

        try {
            const decoded = atob(code);
            const parts = decoded.split('|');
            mineIndex = parseInt(parts[0]);
            
            usedCodes.add(code); 
            startGame();
        } catch (e) {
            alert("Mã trò chơi không hợp lệ hoặc đã bị chỉnh sửa!");
        }
    }

    function startGame() {
        document.getElementById('game-ui').classList.remove('hidden');
        playBoardState = [-1, -1, -1, -1, -1, -1, -1, -1, -1];
        gameActive = true;
        timeLeft = 60;
        document.getElementById('play-msg').innerHTML = '';
        renderPlayBoard();
        clearInterval(gameTimer);
        
        document.getElementById('timer').innerText = "01:00";
        gameTimer = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            
            if (timeLeft <= 0) {
                endGame(false, "⏱️ Hết giờ! Bạn đã thất bại vì không chọn đủ 8 ô trong 1 phút.");
            }
        }, 1000);
    }

    function renderPlayBoard() {
        const board = document.getElementById('play-board');
        board.innerHTML = '';
        playBoardState.forEach((val, idx) => {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            
            if (val === 0) {
                cell.classList.add('safe');
                cell.innerText = '💎';
            } else if (val === 1) {
                cell.classList.add('mine');
                cell.innerText = '💣';
            }
            
            cell.onclick = () => handlePlayClick(idx);
            board.appendChild(cell);
        });
    }

    function handlePlayClick(idx) {
        if (!gameActive) return;
