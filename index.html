<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #333;
            box-sizing: border-box;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }
        input, button {
            padding: 10px 15px;
            font-size: 16px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #2ed573;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 15px;
            font-weight: bold;
            color: #ff4757;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Vòng Quay May Mắn (10 - 50)</h2>
    
    <div id="auth-box">
        <input type="text" id="code-input" placeholder="Nhập mã của bạn tại đây...">
        <button id="activate-btn" onclick="checkCode()">Xác nhận mã</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>

    <button id="spin-btn" onclick="spinWheel()" disabled>QUAY NGAY</button>
    <div id="message">Vui lòng nhập mã để kích hoạt vòng quay.</div>
</div>

<script>
    // Khởi tạo danh sách số từ 10 đến 50
    const numbers = [];
    for (let i = 10; i <= 50; i++) {
        numbers.push(i);
    }

    // Danh sách mã hợp lệ và trạng thái sử dụng (lưu tạm thời trên trình duyệt)
    const validCodes = {
        'NHM1': true,
        'NHM2': true
    };

    let hasTurn = false; 
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    const center = size / 2;
    const arcs = numbers.length;
    const arcAngle = (2 * Math.PI) / arcs;

    // Vẽ vòng quay công bằng về mặt thị giác
    function drawWheel() {
        numbers.forEach((num, i) => {
            const angle = i * arcAngle;
            ctx.beginPath();
            ctx.fillStyle = i % 2 === 0 ? '#1e90ff' : '#ffa500';
            ctx.moveTo(center, center);
            ctx.arc(center, center, center - 10, angle, angle + arcAngle);
            ctx.lineTo(center, center);
            ctx.fill();

            // Vẽ số
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(angle + arcAngle / 2);
            ctx.textAlign = 'right';
            ctx.fillStyle = 'white';
            ctx.font = 'bold 10px Arial';
            ctx.fillText(num, center - 20, 4);
            ctx.restore();
        });
    }
    drawWheel();

    // Kiểm tra mã người dùng nhập
    function checkCode() {
        const input = document.getElementById('code-input').value.trim().toUpperCase();
        const msg = document.getElementById('message');
        
        if (validCodes[input] === true) {
            validCodes[input] = false; // Đánh dấu mã đã sử dụng
            hasTurn = true;
            document.getElementById('spin-btn').disabled = false;
            document.getElementById('code-input').value = '';
            msg.innerText = "Mã hợp lệ! Bạn có 1 lượt quay.";
            msg.style.color = "#2ed573";
        } else if (validCodes[input] === false) {
            msg.innerText = "Mã này đã được sử dụng trước đó!";
            msg.style.color = "#ff4757";
        } else {
            msg.innerText = "Mã không chính xác. Vui lòng thử lại.";
            msg.style.color = "#ff4757";
        }
    }

    // Cài đặt logic quay luôn trúng số 45
    function spinWheel() {
        if (!hasTurn) return;
        hasTurn = false; // Khóa lượt ngay lập tức
        document.getElementById('spin-btn').disabled = true;

        const targetNumber = 45;
        const targetIndex = numbers.indexOf(targetNumber);

        // Tính toán góc quay để mũi tên (ở đỉnh 12 giờ) chỉ đúng số 45
        // Công thức tính toán vị trí dừng chính xác trên Canvas
        const targetAngle = (targetIndex * arcAngle) + (arcAngle / 2);
        const desiredStopAngle = (3 * Math.PI / 2) - targetAngle;
        
        // Quay thêm 5 vòng (360 độ * 5) để tạo hiệu ứng mượt mà
        const totalRotation = (desiredStopAngle) + (10 * Math.PI); 

        canvas.style.transform = `rotate(${totalRotation}rad)`;

        setTimeout(() => {
            document.getElementById('message').innerText = `Chúc mừng! Bạn đã trúng số ${targetNumber}!`;
            document.getElementById('message').style.color = "#2ed573";
        }, 4000); // Trùng với thời gian transition 4s trong CSS
    }
</script>

</body>
</html>
